<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Submit expense items for reimbursement. Supports Travel (Air and Car), Food, Hotel, and Mobile categories." />
  <title>Create Expense Report &ndash; Expense Manager</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ── Page Header ──────────────────────────────────────────────────────── -->
  <header class="page-header">
    <h1>Create Expense Report</h1>
    <p class="subtitle">Submit your expenses for reimbursement. All amounts in USD (&dollar;).</p>
  </header>

  <!-- ── Main Content ─────────────────────────────────────────────────────── -->
  <main>

    <!-- Screen-reader live region for dynamic announcements (row add/remove, submit status) -->
    <div
      id="form-status"
      aria-live="polite"
      aria-atomic="true"
      class="sr-only"
    ></div>

    <!-- Success Banner (shown after successful submission) -->
    <div
      id="success-banner"
      role="status"
      aria-live="polite"
      hidden
    >Your expense report has been submitted successfully!</div>

    <!-- ── Expense Form ──────────────────────────────────────────────────── -->
    <form
      id="expense-form"
      novalidate
      aria-label="Expense Report Form"
    >

      <!-- Dynamic line-item rows are inserted here by form.js -->
      <div id="line-items" aria-live="polite" aria-relevant="additions removals">
        <!-- Rows cloned from #line-item-template are appended here -->
      </div>

      <!-- ── Form Footer: Running Total + Actions ──────────────────────── -->
      <div class="form-footer">
        <div class="form-footer-left">
          <!-- Running total — uses <output> for semantic association -->
          <output
            id="running-total"
            for="line-items"
            aria-label="Running total of all valid expense amounts"
          >Total: $0.00</output>

          <!-- Limit reached message -->
          <p id="limit-reached-msg" hidden aria-live="polite">
            Maximum of 10 line items reached.
          </p>
        </div>

        <div class="form-actions">
          <button
            type="button"
            id="add-item-btn"
            class="btn btn-secondary"
            aria-label="Add another line item"
          >+ Add Line Item</button>

          <button
            type="submit"
            id="submit-btn"
            class="btn btn-primary"
          >Submit Expense Report</button>
        </div>
      </div>

    </form>
    <!-- ── /Expense Form ─────────────────────────────────────────────────── -->

  </main>

  <!--
    ── Line-Item Template ───────────────────────────────────────────────────
    Hidden. Cloned by form.js for each row.
    data-tmpl-id / data-tmpl-for / data-tmpl-error-for attributes are
    rewritten with a unique counter suffix by form.js before insertion.
    Placeholder IDs use the pattern "<field>-TMPL".
  -->
  <template id="line-item-template">
    <fieldset class="line-item" aria-label="Expense line item">
      <legend>Line Item</legend>

      <!-- Remove button (hidden on sole row; managed by form.js) -->
      <button
        type="button"
        class="remove-item-btn"
        aria-label="Remove this line item"
      >&times; Remove</button>

      <div class="line-item-grid">

        <!-- Description -->
        <div class="form-group full-width">
          <label data-tmpl-for="desc">
            Description <span class="required-mark" aria-hidden="true">*</span>
          </label>
          <input
            type="text"
            name="description"
            data-tmpl-id="desc"
            placeholder="e.g. Round-trip flight JFK to LAX"
            maxlength="200"
            autocomplete="off"
            aria-required="true"
          />
          <span
            class="field-error"
            data-tmpl-error-for="desc"
            role="alert"
          ></span>
        </div>

        <!-- Category -->
        <div class="form-group">
          <label data-tmpl-for="cat">
            Category <span class="required-mark" aria-hidden="true">*</span>
          </label>
          <select
            name="category"
            data-tmpl-id="cat"
            aria-required="true"
          >
            <!-- Options populated by form.js from CATEGORIES constant -->
          </select>
          <span
            class="field-error"
            data-tmpl-error-for="cat"
            role="alert"
          ></span>
        </div>

        <!-- Amount (USD) -->
        <div class="form-group">
          <label data-tmpl-for="amt">
            Amount (USD) <span class="required-mark" aria-hidden="true">*</span>
          </label>
          <div class="amount-wrapper">
            <span class="currency-prefix" aria-hidden="true">$</span>
            <input
              type="number"
              name="amount"
              data-tmpl-id="amt"
              placeholder="0.00"
              min="0.01"
              step="0.01"
              aria-required="true"
              aria-label="Amount in US dollars"
            />
          </div>
          <span
            class="field-error"
            data-tmpl-error-for="amt"
            role="alert"
          ></span>
        </div>

        <!-- Expense Date -->
        <div class="form-group">
          <label data-tmpl-for="date">
            Expense Date <span class="required-mark" aria-hidden="true">*</span>
          </label>
          <input
            type="date"
            name="date"
            data-tmpl-id="date"
            aria-required="true"
          />
          <span
            class="field-error"
            data-tmpl-error-for="date"
            role="alert"
          ></span>
        </div>

        <!-- Receipt Attachment -->
        <div class="form-group full-width">
          <label data-tmpl-for="attach">
            Receipt Attachment
            <span class="sr-only">(optional; PDF, JPG, or PNG; max 5 MB)</span>
          </label>
          <input
            type="file"
            name="attachment"
            data-tmpl-id="attach"
            accept=".pdf,.jpg,.jpeg,.png,application/pdf,image/jpeg,image/png"
            data-tmpl-aria-describedby="attach-hint"
          />
          <span
            data-tmpl-id="attach-hint"
            class="file-preview"
            aria-live="polite"
          ></span>
          <span
            class="field-error"
            data-tmpl-error-for="attach"
            role="alert"
          ></span>
        </div>

      </div>
      <!-- /.line-item-grid -->

    </fieldset>
  </template>
  <!-- ── /Line-Item Template ───────────────────────────────────────────────── -->

  <!-- ES module entry point — must be type="module" for import/export support -->
  <script type="module" src="js/form.js"></script>

</body>
</html>
